name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - name: clewso-core
            path: packages/clew-core
          - name: clewso-ingestion
            path: packages/clew-ingestion
          - name: clewso
            path: .
    name: build (${{ matrix.package.name }})
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build package
        working-directory: ${{ matrix.package.path }}
        run: uv build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: ${{ matrix.package.path }}/dist/

  # Publish in dependency order: core → ingestion → clewso
  publish-core:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-clewso-core
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-ingestion:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-clewso-ingestion
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-clewso:
    needs: publish-ingestion
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-clewso
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
