name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.2.0)"
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Build all packages
        run: |
          # uv build from workspace members outputs to root dist/
          cd packages/clew-core && uv build && cd ../..
          cd packages/clew-ingestion && uv build && cd ../..
          uv build
          ls -la dist/

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Publish in dependency order: core → ingestion → clewso
  publish-core:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-all/
      - run: |
          mkdir -p dist
          cp dist-all/clewso_core-* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-ingestion:
    needs: publish-core
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-all/
      - run: |
          mkdir -p dist
          cp dist-all/clewso_ingestion-* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-clewso:
    needs: publish-ingestion
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist-all/
      - run: |
          mkdir -p dist
          # Copy only the root clewso package (not core or ingestion)
          cp dist-all/clewso-* dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
