# Language Registry
#
# Each [[language]] entry maps a tree-sitter grammar to its file extensions
# and the AST node types used for extracting definitions, imports, and calls.
# To add a new language, append a new [[language]] block.

[[language]]
name = "python"
extensions = [".py"]
definition_types = ["function_definition", "class_definition"]
import_types = ["import_statement", "import_from_statement"]
call_types = ["call"]

[[language]]
name = "javascript"
extensions = [".js", ".jsx"]
definition_types = ["function_declaration", "class_declaration", "method_definition"]
import_types = ["import_statement"]
call_types = ["call_expression"]

[[language]]
name = "typescript"
extensions = [".ts", ".tsx"]
definition_types = ["function_declaration", "class_declaration", "method_definition"]
import_types = ["import_statement"]
call_types = ["call_expression"]

[[language]]
name = "go"
extensions = [".go"]
definition_types = ["function_declaration", "method_declaration", "type_declaration"]
import_types = ["import_declaration", "import_spec"]
call_types = ["call_expression"]

[[language]]
name = "rust"
extensions = [".rs"]
definition_types = ["function_item", "struct_item", "enum_item", "trait_item", "impl_item", "type_item"]
import_types = ["use_declaration"]
call_types = ["call_expression", "macro_invocation"]

[[language]]
name = "cpp"
extensions = [".cpp", ".cc", ".c", ".h", ".hpp"]
definition_types = ["function_definition", "class_specifier", "struct_specifier", "namespace_definition"]
import_types = ["preproc_include"]
call_types = ["call_expression"]

[[language]]
name = "java"
extensions = [".java"]
definition_types = ["method_declaration", "class_declaration", "interface_declaration", "enum_declaration"]
import_types = ["import_declaration"]
call_types = ["method_invocation"]

[[language]]
name = "c_sharp"
extensions = [".cs"]
definition_types = ["method_declaration", "class_declaration", "interface_declaration", "struct_declaration", "enum_declaration"]
import_types = ["using_directive"]
call_types = ["invocation_expression"]

[[language]]
name = "ruby"
extensions = [".rb"]
definition_types = ["method", "class", "module", "singleton_method"]
import_types = ["call"]
call_types = ["call", "method_call"]

[[language]]
name = "php"
extensions = [".php"]
definition_types = ["function_definition", "class_declaration", "method_declaration"]
import_types = ["namespace_use_declaration"]
call_types = ["function_call_expression", "member_call_expression"]

[[language]]
name = "swift"
extensions = [".swift"]
definition_types = ["function_declaration", "class_declaration", "struct_declaration", "protocol_declaration", "enum_declaration"]
import_types = ["import_declaration"]
call_types = ["call_expression"]

[[language]]
name = "kotlin"
extensions = [".kt", ".kts"]
definition_types = ["function_declaration", "class_declaration", "object_declaration"]
import_types = ["import_header"]
call_types = ["call_expression"]

[[language]]
name = "scala"
extensions = [".scala"]
definition_types = ["function_definition", "class_definition", "object_definition", "trait_definition"]
import_types = ["import_declaration"]
call_types = ["call_expression"]

[[language]]
