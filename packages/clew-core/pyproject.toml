[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "clewso-core"
version = "0.1.6"
description = "Shared core library for Clew Engine packages"
requires-python = ">=3.11"
dependencies = [
    "openai>=1.6.0",
    "httpx>=0.26.0,<1.0.0",
    "pydantic>=2.0",
]

[project.urls]
Homepage = "https://github.com/clewnet/clewso"
Repository = "https://github.com/clewnet/clewso"

[dependency-groups]
dev = [
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "respx>=0.20.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/clewso_core"]
